<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

    <div class="container">

        <h1>🌿 Daily Inspiration</h1>

        <p class="tagline">
            One positive thought can change your entire day.
        </p>

        <div id="quoteCard">

            <div class="overlay"></div>

            <div class="content">

                <p id="quote">
                    Loading Inspiration...
                </p>

                <h3 id="author"></h3>

                <small class="credit">
                   Created by our Team!
                </small>

            </div>

        </div>

        <p id="counter">
            Quotes Viewed: 0
        </p>

        <div class="buttons">

            <button onclick="showQuote()">
                ✨Inspire Me!
            </button>

            <button onclick="downloadCard()">
                📥 Download
            </button>

            <button onclick="shareImage()">
                📱 Share
            </button>

        </div>

    </div>

    <footer>
        © 2026 Heemanshika-Hemant-Insiya-Jatin
    </footer>

    <script src="script.js"></script>

</body>

</html>
